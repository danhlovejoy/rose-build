# ============================================================
# build.conf — Build Configuration
#
# This file controls how the Canvas build pipeline behaves.
# The build script (build/build.sh) reads this automatically.
# Command-line flags override these settings.
# ============================================================

# DELIVERY MODE
# -------------
# "concurrent"  — Both AIML 2003 and AIML 2013 offered together.
#                  All dual-enrollment content (bridge boxes, combined
#                  labs) is included in the build output. Use this when
#                  students are enrolled in both courses simultaneously.
#
# "standalone"  — Single-course delivery. All elements marked with
#                  data-concurrent="true" are stripped, and file-level
#                  concurrent files (combined labs) are excluded entirely.
#                  Use this when teaching one course independently.
#
# IMPORTANT: If you are teaching both courses at the same time,
# this MUST be set to "concurrent" or your students will be missing
# bridge boxes and combined assignment options.
#
delivery_mode=concurrent
