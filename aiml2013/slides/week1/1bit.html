<!DOCTYPE html>
<html>
<head>
<style>
  body { background-color: #ffffff; padding: 20px; }
  .grid {
    display: flex;
    flex-wrap: wrap;
    width: 550px; 
    gap: 8px;
  }
  .square {
    width: 100px;
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    font-size: 24px;
    border: 1px solid #ccc;
  }
  /* 1-bit States */
  .bit-1 { background-color: #000000; color: #FFFFFF; } /* Shape (Black) */
  .bit-0 { background-color: #FFFFFF; color: #000000; } /* Background (White) */
</style>
</head>
<body>

<div class="grid">
  <div class="square bit-0">0</div>
  <div class="square bit-0">0</div>
  <div class="square bit-1">1</div>
  <div class="square bit-0">0</div>
  <div class="square bit-0">0</div>

  <div class="square bit-0">0</div>
  <div class="square bit-0">0</div>
  <div class="square bit-1">1</div>
  <div class="square bit-0">0</div>
  <div class="square bit-0">0</div>

  <div class="square bit-1">1</div>
  <div class="square bit-1">1</div>
  <div class="square bit-1">1</div>
  <div class="square bit-1">1</div>
  <div class="square bit-1">1</div>

  <div class="square bit-0">0</div>
  <div class="square bit-0">0</div>
  <div class="square bit-1">1</div>
  <div class="square bit-0">0</div>
  <div class="square bit-0">0</div>

  <div class="square bit-0">0</div>
  <div class="square bit-0">0</div>
  <div class="square bit-1">1</div>
  <div class="square bit-0">0</div>
  <div class="square bit-0">0</div>
</div>

</body>
</html>
